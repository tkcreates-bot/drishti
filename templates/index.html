<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drishti — See Your Health Clearly</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, #0d1f4a 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, #0a2a1a 0%, transparent 50%),
                        #000;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite;
            z-index: 0;
        }
        .orb1 { width: 400px; height: 400px; background: #7c3aed; top: -100px; left: -100px; animation-delay: 0s; }
        .orb2 { width: 300px; height: 300px; background: #2563eb; bottom: -50px; right: -50px; animation-delay: 3s; }
        .orb3 { width: 200px; height: 200px; background: #059669; top: 50%; left: 50%; animation-delay: 6s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Grid lines */
        .grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(124, 58, 237, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Main content */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(124, 58, 237, 0.3);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            color: #a78bfa;
            margin-bottom: 24px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .badge-dot {
            width: 6px; height: 6px;
            background: #7c3aed;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Title */
        h1 {
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 700;
            line-height: 1;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(124, 58, 237, 0.4));
        }

        .tagline {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: #6b7280;
            text-align: center;
            margin-bottom: 60px;
            font-weight: 300;
            letter-spacing: 0.02em;
        }
        .tagline span { color: #a78bfa; }

        /* Upload card */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 520px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 0 1px rgba(124, 58, 237, 0.1),
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.05);
            transform: perspective(1000px) rotateX(2deg);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: perspective(1000px) rotateX(0deg) translateY(-4px);
        }

        /* Upload area */
        .upload-area {
            border: 1.5px dashed rgba(124, 58, 237, 0.3);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }
        .upload-area::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(124,58,237,0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .upload-area:hover {
            border-color: rgba(124, 58, 237, 0.6);
            background: rgba(124, 58, 237, 0.05);
        }
        .upload-area:hover::before { opacity: 1; }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
        }
        .upload-area h3 {
            font-size: 1rem;
            font-weight: 500;
            color: #e5e7eb;
            margin-bottom: 6px;
        }
        .upload-area p {
            font-size: 0.8rem;
            color: #4b5563;
        }

        /* File name display */
        #file-name {
            font-size: 0.85rem;
            color: #a78bfa;
            margin-top: 8px;
            min-height: 20px;
        }

        input[type="file"] { display: none; }

        /* Button */
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #6d28d9, #1d4ed8);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn:hover::before { opacity: 1; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.4); }
        .btn span { position: relative; z-index: 1; }

        /* Stats */
        .stats {
            display: flex;
            gap: 24px;
            margin-top: 48px;
            justify-content: center;
        }
        .stat {
            text-align: center;
        }
        .stat-num {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(167, 139, 250, 0.6);
            border-radius: 50%;
            animation: rise linear infinite;
        }
        @keyframes rise {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) translateX(50px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="grid"></div>

    <!-- Floating orbs -->
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="badge">
            <div class="badge-dot"></div>
            AI Powered Health Analysis
        </div>

        <h1>Drishti</h1>
        <p class="tagline">See your health <span>clearly</span> — no medical degree required</p>

        <div class="card">
            <form action="/analyze" method="POST" enctype="multipart/form-data">
                <label for="report">
                    <div class="upload-area">
                        <span class="upload-icon">🧬</span>
                        <h3>Drop your medical report here</h3>
                        <p>Blood tests, lab reports, diagnostic PDFs</p>
                        <p id="file-name"></p>
                    </div>
                </label>
                <input type="file" id="report" name="report" accept=".pdf" onchange="showFileName(this)">
                <button type="submit" class="btn">
                    <span>Analyze My Report ✦</span>
                </button>
            </form>
        </div>
        <div style="text-align:center; margin-top: 16px;">
    <a href="/general-chat" style="
        color: #a78bfa;
        font-size: 0.85rem;
        text-decoration: none;
        border-bottom: 1px solid rgba(167,139,250,0.3);
        padding-bottom: 2px;
    ">
        💬 No report? Chat with Drishti directly →
    </a>
</div>
        <div class="stats">
            <div class="stat">
                <div class="stat-num">500+</div>
                <div class="stat-label">Reports Analyzed</div>
            </div>
            <div class="stat">
                <div class="stat-num">2sec</div>
                <div class="stat-label">Avg Analysis Time</div>
            </div>
            <div class="stat">
                <div class="stat-num">100%</div>
                <div class="stat-label">Free to Use</div>
            </div>
        </div>
    </div>

    <script>
        // Show file name when selected
        function showFileName(input) {
    const fileName = input.files[0]?.name || '';
    document.getElementById('file-name').textContent = fileName ? '📄 ' + fileName : '';
    if (fileName) {
        document.querySelector('.btn').style.background = 'linear-gradient(135deg, #059669, #2563eb)';
        document.querySelector('.btn span').textContent = 'Report Ready — Analyze Now ✦';
        document.querySelector('.upload-area').style.borderColor = 'rgba(5, 150, 105, 0.6)';
        document.querySelector('.upload-area').style.background = 'rgba(5, 150, 105, 0.05)';
        document.querySelector('.upload-icon').textContent = '✅';
    }
}

        // Generate particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 10 + 8) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
            container.appendChild(p);
        }

        // 3D card tilt effect
        const card = document.querySelector('.card');
        document.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const rotateX = (e.clientY - centerY) / 30;
            const rotateY = (e.clientX - centerX) / 30;
            card.style.transform = `perspective(1000px) rotateX(${-rotateX}deg) rotateY(${rotateY}deg)`;
        });
        document.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateX(2deg) rotateY(0deg)';
        });
    </script>
    <!-- Loading Overlay -->
<div id="loadingOverlay" style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); align-items:center; justify-content:center; flex-direction:column; gap:24px;">
    <div style="position:relative; width:80px; height:80px;">
        <div style="position:absolute; inset:0; border-radius:50%; border:2px solid transparent; border-top-color:#7c3aed; animation:spin 1s linear infinite;"></div>
        <div style="position:absolute; inset:8px; border-radius:50%; border:2px solid transparent; border-top-color:#2563eb; animation:spin 0.7s linear infinite reverse;"></div>
        <div style="position:absolute; inset:16px; border-radius:50%; border:2px solid transparent; border-top-color:#a78bfa; animation:spin 0.5s linear infinite;"></div>
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:1.2rem;">🧬</div>
    </div>
    <div style="text-align:center;">
        <div id="loadingText" style="font-size:1.1rem; font-weight:600; color:white; margin-bottom:8px;">Analyzing your report...</div>
        <div style="font-size:0.8rem; color:#6b7280;" id="loadingSubtext">This may take a few seconds</div>
    </div>
    <div style="display:flex; gap:6px;">
        <div style="width:6px;height:6px;border-radius:50%;background:#7c3aed;animation:bounce2 1.2s infinite;"></div>
        <div style="width:6px;height:6px;border-radius:50%;background:#2563eb;animation:bounce2 1.2s infinite 0.2s;"></div>
        <div style="width:6px;height:6px;border-radius:50%;background:#a78bfa;animation:bounce2 1.2s infinite 0.4s;"></div>
    </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes bounce2 { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }
</style>

<script>
const loadingMessages = [
    "Reading your report... 📄",
    "Identifying key values... 🔍",
    "Calculating health score... 💯",
    "Generating diet recommendations... 🥗",
    "Almost done... ✨"
];

document.querySelector('form').addEventListener('submit', function(e) {
    const file = document.getElementById('report').files[0];
    if (!file) return;
    
    const overlay = document.getElementById('loadingOverlay');
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    
    let i = 0;
    const interval = setInterval(() => {
        if (i < loadingMessages.length) {
            document.getElementById('loadingText').textContent = loadingMessages[i];
            i++;
        } else {
            clearInterval(interval);
        }
    }, 2000);
});
</script>
</body>
</html>
